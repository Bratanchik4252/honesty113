<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Honesty113 | Фан-портал</title>
    <link rel="icon" href="/IkonkaTOXA" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0415, #020108);
            min-height: 100vh;
            color: #f0e6ff;
            overflow-x: hidden;
        }

        /* ===== АНИМАЦИИ ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px #a55be0; }
            50% { box-shadow: 0 0 20px #bf7cff, 0 0 30px #9147ff; }
            100% { box-shadow: 0 0 5px #a55be0; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== ЛАЙАУТ С САЙДБАРОМ ===== */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* ===== САЙДБАР (как в Telegram) ===== */
        .sidebar {
            width: 280px;
            background: rgba(18, 12, 28, 0.7);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(165, 91, 224, 0.3);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            transition: all 0.3s ease;
            z-index: 100;
            animation: slideIn 0.5s ease;
        }

        .sidebar-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .sidebar-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ceadff, #a159ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .sidebar-header p {
            font-size: 0.8rem;
            color: #bda0e6;
            margin-top: 5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            margin: 5px 0;
            border-radius: 14px;
            color: #bda0e6;
            transition: all 0.25s ease;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-item:hover {
            background: rgba(165, 91, 224, 0.2);
            color: white;
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(145deg, #9147ff, #6e2bc7);
            color: white;
            box-shadow: 0 4px 15px rgba(145, 71, 255, 0.3);
        }

        .nav-item .icon {
            font-size: 1.4rem;
            width: 32px;
            text-align: center;
        }

        .nav-divider {
            height: 1px;
            background: rgba(165, 91, 224, 0.2);
            margin: 15px 0;
        }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px 40px;
            transition: all 0.3s ease;
        }

        /* ===== КАРТОЧКИ ===== */
        .card {
            background: rgba(26, 16, 40, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(165, 91, 224, 0.3);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease;
        }

        .card:hover {
            border-color: #bf7cff;
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* ===== ПОСТЫ ===== */
        .post-header {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #bf7cff;
        }

        .post-author {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .post-time {
            font-size: 0.75rem;
            color: #9b86b3;
        }

        .post-content {
            margin: 15px 0;
            line-height: 1.5;
        }

        .post-tag {
            display: inline-block;
            background: rgba(145, 71, 255, 0.2);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            margin-right: 10px;
        }

        .post-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(165, 91, 224, 0.2);
        }

        .stat-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: #bda0e6;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .stat-btn:hover {
            color: #bf7cff;
            transform: scale(1.05);
        }

        /* ===== КОММЕНТАРИИ ===== */
        .comment-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(165, 91, 224, 0.2);
        }

        .comment {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .comment-bubble {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 10px 15px;
            flex: 1;
        }

        /* ===== ФОРМЫ ===== */
        .input-modern {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(165, 91, 224, 0.5);
            border-radius: 60px;
            padding: 12px 20px;
            color: white;
            width: 100%;
            transition: all 0.2s;
        }

        .input-modern:focus {
            outline: none;
            border-color: #bf7cff;
            box-shadow: 0 0 10px #bf7cff;
        }

        .btn-primary {
            background: linear-gradient(145deg, #9147ff, #6e2bc7);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(145, 71, 255, 0.4);
        }

        /* ===== КАЛЕНДАРЬ ===== */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }
        .calendar-day {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .calendar-day.has-vod { background: #9147ff; color: white; }
        .calendar-day.live { background: #ff4444; animation: glowPulse 1s infinite; }

        /* ===== МОБИЛЬНАЯ АДАПТАЦИЯ ===== */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 260px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .menu-toggle {
                display: block;
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 200;
                background: #9147ff;
                padding: 10px;
                border-radius: 50%;
                cursor: pointer;
            }
        }
        .menu-toggle { display: none; }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>HONESTY113</h1>
            <p>фан-портал</p>
        </div>
        <div class="nav-item active" data-page="feed">
            <span class="icon">📰</span> <span>Лента</span>
        </div>
        <div class="nav-item" data-page="calendar">
            <span class="icon">📅</span> <span>Календарь</span>
        </div>
        <div class="nav-item" data-page="suggestions">
            <span class="icon">🎯</span> <span>Предложки</span>
        </div>
        <div class="nav-item" data-page="links">
            <span class="icon">🔗</span> <span>Ссылки</span>
        </div>
        <div class="nav-divider"></div>
        <div class="nav-item" data-page="settings">
            <span class="icon">⚙️</span> <span>Настройки</span>
        </div>
        <div class="nav-item" data-page="profile">
            <span class="icon">👤</span> <span>Профиль</span>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <!-- Контент будет загружаться сюда динамически -->
        <div style="text-align: center; padding: 50px;">Загрузка...</div>
    </div>
</div>

<script>
    // === ГЛОБАЛЬНЫЕ ДАННЫЕ ===
    let currentUser = null;
    let posts = [];
    let vods = [];

    // === ПЕРЕКЛЮЧЕНИЕ СТРАНИЦ ===
    function loadPage(page) {
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.querySelector(`[data-page="${page}"]`).classList.add('active');

        const content = document.getElementById('mainContent');
        if (page === 'feed') renderFeed(content);
        else if (page === 'calendar') renderCalendar(content);
        else if (page === 'suggestions') renderSuggestions(content);
        else if (page === 'links') renderLinks(content);
        else if (page === 'settings') renderSettings(content);
        else if (page === 'profile') renderProfile(content);
    }

    // === ЛЕНТА (ПОСТЫ + КОММЕНТАРИИ) ===
    async function renderFeed(container) {
        // тут будет загрузка постов с API
        container.innerHTML = `<div class="card">🔥 Лента загружается...</div>`;
        // заглушка для демо
        container.innerHTML = `
            <div class="card">
                <div class="post-header">
                    <img class="post-avatar" src="https://static-cdn.jtvnw.net/user-default-pictures-uv/13e5d884-3c7e-4c9a-9c6c-6f3c6d5f8e6a-profile_image-70x70.png">
                    <div><div class="post-author">xX_HonestyFan</div><div class="post-time">2 часа назад</div></div>
                </div>
                <div class="post-content">🔥 ПРЕДЛАГАЮ ЗАСТРИМИТЬ НОВЫЙ ХАРДКОРНЫЙ СИД В МАЙНКРАФТЕ! УЖЕ НАШЕЛ СУПЕР-СЛОЖНЫЙ</div>
                <div><span class="post-tag">Игра</span><span class="post-tag">Minecraft</span></div>
                <div class="post-stats">
                    <button class="stat-btn">👍 156</button>
                    <button class="stat-btn">👎 12</button>
                    <button class="stat-btn">💬 34</button>
                </div>
            </div>
            <div class="card">
                <div class="post-header">
                    <img class="post-avatar" src="https://static-cdn.jtvnw.net/user-default-pictures-uv/13e5d884-3c7e-4c9a-9c6c-6f3c6d5f8e6a-profile_image-70x70.png">
                    <div><div class="post-author">gamer123</div><div class="post-time">5 часов назад</div></div>
                </div>
                <div class="post-content">OUTLAST 2 НА МАКСИМАЛКЕ С КАМЕРОЙ НА ЛИЦО! ЭТО БУДЕТ ЖЕСТКО!</div>
                <div><span class="post-tag">Хоррор</span></div>
                <div class="post-stats">
                    <button class="stat-btn">👍 89</button>
                    <button class="stat-btn">👎 4</button>
                    <button class="stat-btn">💬 12</button>
                </div>
            </div>
            <div style="margin-top:20px;"><button class="btn-primary" onclick="alert('Модалка создания поста будет здесь')">➕ Новый пост</button></div>
        `;
    }

    function renderCalendar(container) {
        container.innerHTML = `<div class="card">📅 Календарь стримов (будет тут)</div>`;
    }
    function renderSuggestions(container) {
        container.innerHTML = `<div class="card">🎯 Предложки (голосование + комменты)</div>`;
    }
    function renderLinks(container) {
        container.innerHTML = `<div class="card">
            <h3>🔗 Полезные ссылки</h3>
            <div style="display:flex; gap:20px; flex-wrap:wrap; margin-top:20px;">
                <a href="https://twitch.tv/honesty113" target="_blank" class="btn-primary" style="display:inline-block;">📺 Twitch</a>
                <a href="https://t.me/hoststreet" target="_blank" class="btn-primary" style="display:inline-block;">📱 Telegram</a>
                <a href="https://discord.gg/ynDWeAYB2" target="_blank" class="btn-primary" style="display:inline-block;">💬 Discord</a>
                <a href="https://www.donationalerts.com/r/honesty113" target="_blank" class="btn-primary" style="display:inline-block;">💰 Donate</a>
                <a href="https://memealerts.com/6602a0ee288f43c13c2293df" target="_blank" class="btn-primary" style="display:inline-block;">🔞 Хуюстрики</a>
            </div>
        </div>`;
    }
    function renderSettings(container) {
        container.innerHTML = `<div class="card">⚙️ Настройки: тема, шрифты и уведомления (будет)</div>`;
    }
    function renderProfile(container) {
        container.innerHTML = `<div class="card">👤 Профиль: аватарка, статистика, мои посты (будет)</div>`;
    }

    // === ИНИЦИАЛИЗАЦИЯ ===
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => loadPage(item.dataset.page));
    });
    loadPage('feed');
</script>
</body>
</html>
