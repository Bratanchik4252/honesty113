<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Honesty113 | Фан-портал</title>
    <link rel="icon" href="/IkonkaTOXA" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            transition: all 0.2s ease;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
        }
        body.dark {
            background: radial-gradient(circle at 20% 30%, #0a0415, #020108);
            color: #f0e6ff;
        }
        body.light {
            background: #f5f0ff;
            color: #1a1028;
        }
        body.light .sidebar { background: rgba(255,255,255,0.9); backdrop-filter: blur(16px); border-right-color: rgba(145,71,255,0.2); }
        body.light .nav-item { color: #4a2b6e; }
        body.light .nav-item:hover { background: rgba(145,71,255,0.1); color: #9147ff; }
        body.light .nav-item.active { background: linear-gradient(145deg, #9147ff, #6e2bc7); color: white; }
        body.light .card { background: rgba(255,255,255,0.8); border-color: rgba(145,71,255,0.3); }
        body.light .post-tag { background: rgba(145,71,255,0.1); }
        body.light .stat-btn { color: #4a2b6e; }
        body.light .input-modern { background: white; border-color: #bda0e6; color: #1a1028; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(18, 12, 28, 0.7);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(165, 91, 224, 0.3);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            transition: all 0.3s ease;
            z-index: 100;
            animation: slideIn 0.5s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .sidebar-top { flex: 1; }
        .sidebar-header { margin-bottom: 40px; text-align: center; }
        .sidebar-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ceadff, #a159ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            margin: 5px 0;
            border-radius: 14px;
            color: #bda0e6;
            transition: all 0.25s ease;
            cursor: pointer;
            font-weight: 500;
        }
        .nav-item:hover { background: rgba(165, 91, 224, 0.2); color: white; transform: translateX(5px); }
        .nav-item.active { background: linear-gradient(145deg, #9147ff, #6e2bc7); color: white; box-shadow: 0 4px 15px rgba(145, 71, 255, 0.3); }
        .nav-item .icon { font-size: 1.4rem; width: 32px; text-align: center; }
        .nav-divider { height: 1px; background: rgba(165, 91, 224, 0.2); margin: 15px 0; }
        .sidebar-bottom { margin-top: auto; padding-top: 20px; }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px 40px;
            transition: all 0.3s ease;
        }

        .card {
            background: rgba(26, 16, 40, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(165, 91, 224, 0.3);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            animation: fadeInUp 0.5s ease;
        }
        .card:hover { border-color: #bf7cff; transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }

        .post-header { display: flex; gap: 15px; margin-bottom: 15px; }
        .post-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid #bf7cff; }
        .post-author { font-weight: 700; font-size: 1.1rem; }
        .post-time { font-size: 0.75rem; color: #9b86b3; }
        .post-content { margin: 15px 0; line-height: 1.5; white-space: pre-wrap; }
        .post-tag { display: inline-block; background: rgba(145, 71, 255, 0.2); padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; margin-right: 10px; margin-bottom: 5px; }
        .post-stats { display: flex; gap: 20px; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(165, 91, 224, 0.2); }
        .stat-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: #bda0e6; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        .stat-btn:hover { color: #bf7cff; transform: scale(1.05); }
        .stat-btn.active { color: #ffd966; }

        .comment-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(165, 91, 224, 0.2); }
        .comment { display: flex; gap: 12px; margin-bottom: 15px; }
        .comment-avatar { width: 32px; height: 32px; border-radius: 50%; }
        .comment-bubble { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 10px 15px; flex: 1; }
        .comment-meta { font-size: 0.7rem; color: #9b86b3; margin-bottom: 5px; }

        .input-modern {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(165, 91, 224, 0.5);
            border-radius: 60px;
            padding: 12px 20px;
            color: white;
            width: 100%;
            transition: all 0.2s;
        }
        .input-modern:focus { outline: none; border-color: #bf7cff; box-shadow: 0 0 10px #bf7cff; }
        textarea.input-modern { border-radius: 24px; resize: vertical; }

        .btn-primary {
            background: linear-gradient(145deg, #9147ff, #6e2bc7);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(145, 71, 255, 0.4); }
        .btn-secondary { background: rgba(145, 71, 255, 0.2); border: 1px solid #9147ff; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1a1028;
            border-radius: 32px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #bf7cff;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .link-card {
            background: rgba(26, 16, 40, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(165, 91, 224, 0.5);
            border-radius: 24px;
            padding: 24px 16px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .link-card:hover {
            transform: translateY(-8px);
            border-color: #bf7cff;
            box-shadow: 0 20px 30px -10px rgba(145, 71, 255, 0.4);
            background: rgba(145, 71, 255, 0.1);
        }
        .link-icon { font-size: 2.5rem; }
        .link-name { font-weight: 700; font-size: 1.1rem; }
        .link-url { font-size: 0.7rem; color: #9b86b3; word-break: break-all; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; margin-top: 20px; }
        .calendar-day { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 16px; cursor: pointer; transition: all 0.2s; }
        .calendar-day.has-vod { background: #9147ff; color: white; }

        .settings-group {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(165, 91, 224, 0.2);
        }
        .settings-label { font-weight: 600; margin-bottom: 12px; display: block; }
        .settings-options { display: flex; gap: 16px; flex-wrap: wrap; }
        .settings-option {
            background: rgba(0,0,0,0.3);
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .settings-option.active { background: linear-gradient(145deg, #9147ff, #6e2bc7); color: white; }

        .profile-header { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; margin-bottom: 24px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #bf7cff; object-fit: cover; }
        .profile-stats { display: flex; gap: 32px; flex-wrap: wrap; margin: 20px 0; }
        .profile-stat { text-align: center; }
        .profile-stat-value { font-size: 1.8rem; font-weight: 800; color: #ffd966; }
        .profile-stat-label { font-size: 0.8rem; color: #9b86b3; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 260px; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
            .menu-toggle { display: block; position: fixed; top: 20px; left: 20px; z-index: 200; background: #9147ff; padding: 10px; border-radius: 50%; cursor: pointer; }
        }
        .menu-toggle { display: none; }

        .loading { text-align: center; padding: 50px; color: #bda0e6; }
    </style>
</head>
<body class="dark">
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-header">
                <h1>HONESTY113</h1>
                <p>фан-портал</p>
            </div>
            <div class="nav-item active" data-page="feed">
                <span class="icon">🎯</span> <span>Предложки</span>
            </div>
            <div class="nav-item" data-page="calendar">
                <span class="icon">📅</span> <span>Календарь</span>
            </div>
            <div class="nav-item" data-page="links">
                <span class="icon">🔗</span> <span>Ссылки</span>
            </div>
            <div class="nav-divider"></div>
            <div class="nav-item" data-page="settings">
                <span class="icon">⚙️</span> <span>Настройки</span>
            </div>
            <div class="nav-item" data-page="profile">
                <span class="icon">👤</span> <span>Профиль</span>
            </div>
        </div>
        <div class="sidebar-bottom">
            <div id="userWidget" style="text-align:center;"></div>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="loading">Загрузка...</div>
    </div>
</div>

<!-- Модалка нового поста -->
<div class="modal" id="postModal">
    <div class="modal-content">
        <h3 style="margin-bottom:20px;">✨ Новая идея для стрима</h3>
        <input type="text" id="postTitle" class="input-modern" placeholder="Заголовок" style="margin-bottom:15px;">
        <textarea id="postText" class="input-modern" rows="4" placeholder="Описание..."></textarea>
        <select id="postCategory" class="input-modern" style="margin-top:15px;">
            <option value="Видео">🎬 Видео</option>
            <option value="Фильм">🎥 Фильм</option>
            <option value="Аниме">🍥 Аниме</option>
            <option value="Сериал">📺 Сериал</option>
            <option value="Игра">🎮 Игра</option>
            <option value="Другое">✨ Другое</option>
        </select>
        <input type="text" id="postGame" class="input-modern" placeholder="Название (игры/фильма/аниме)" style="margin-top:15px;">
        <input type="url" id="postLink" class="input-modern" placeholder="Ссылка (YouTube, Twitch...)" style="margin-top:15px;">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-primary" id="submitPostBtn">Опубликовать</button>
            <button class="btn-primary btn-secondary" id="closeModalBtn">Отмена</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api';
    const CLIENT_ID = 'oivt3xslzr0wi1b3eu4a59lntv5isk';
    const REDIRECT_URI = window.location.origin;

    let currentUser = null;
    let allPosts = [];
    let allComments = {};
    let userVotes = JSON.parse(localStorage.getItem('userVotes')) || {};
    let settings = JSON.parse(localStorage.getItem('userSettings')) || {
        theme: 'dark', fontSize: 'medium', animations: true, defaultSort: 'date_desc', language: 'ru'
    };

    function applySettings() {
        document.body.className = settings.theme;
        document.body.style.fontSize = settings.fontSize === 'large' ? '18px' : settings.fontSize === 'small' ? '14px' : '16px';
        if (!settings.animations) {
            document.querySelectorAll('*').forEach(el => el.style.animation = 'none');
        } else {
            document.querySelectorAll('*').forEach(el => el.style.animation = '');
        }
    }

    function saveSettings() {
        localStorage.setItem('userSettings', JSON.stringify(settings));
        applySettings();
    }

    function loadUserFromStorage() {
        const saved = localStorage.getItem('twitchUser');
        if (saved) {
            currentUser = JSON.parse(saved);
            updateUserWidget();
        }
    }

    function checkTwitchAuth() {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        if (token) {
            fetch('https://api.twitch.tv/helix/users', {
                headers: { 'Authorization': `Bearer ${token}`, 'Client-ID': CLIENT_ID }
            })
            .then(r => r.json())
            .then(data => {
                if (data.data && data.data[0]) {
                    currentUser = data.data[0];
                    localStorage.setItem('twitchUser', JSON.stringify(currentUser));
                    updateUserWidget();
                    window.location.hash = '';
                    loadPage(document.querySelector('.nav-item.active').dataset.page);
                }
            })
            .catch(err => console.error('Auth error:', err));
        }
    }

    function loginWithTwitch() {
        const scopes = 'user:read:email';
        window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=${scopes}`;
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('twitchUser');
        updateUserWidget();
        loadPage(document.querySelector('.nav-item.active').dataset.page);
    }

    function updateUserWidget() {
        const widget = document.getElementById('userWidget');
        if (currentUser) {
            widget.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px; background:rgba(145,71,255,0.2); padding:10px; border-radius:40px;">
                    <img src="${currentUser.profile_image_url}" style="width:32px;height:32px;border-radius:50%;">
                    <span style="font-weight:500;">${escapeHtml(currentUser.display_name)}</span>
                    <button onclick="logout()" style="background:none; border:none; color:#ff6b6b; cursor:pointer;">🚪</button>
                </div>
            `;
        } else {
            widget.innerHTML = `<button class="btn-primary" style="width:100%;" onclick="loginWithTwitch()">🔐 Войти</button>`;
        }
    }

    async function fetchPosts() {
        try {
            const res = await fetch(`${API_BASE}?action=posts`);
            if (!res.ok) throw new Error('HTTP error');
            allPosts = await res.json();
        } catch (err) {
            console.error('Failed to fetch posts:', err);
            allPosts = [];
        }
    }

    async function fetchComments(postId) {
        try {
            const res = await fetch(`${API_BASE}?action=comments&postId=${postId}`);
            if (!res.ok) throw new Error('HTTP error');
            allComments[postId] = await res.json();
        } catch (err) {
            console.error('Failed to fetch comments:', err);
            allComments[postId] = [];
        }
    }

    async function createPost(postData) {
        const res = await fetch(`${API_BASE}?action=create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(postData)
        });
        return await res.json();
    }

    async function addComment(postId, text) {
        const res = await fetch(`${API_BASE}?action=addComment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ postId, text, userId: currentUser?.id, nick: currentUser?.display_name, avatar: currentUser?.profile_image_url })
        });
        return await res.json();
    }

    async function vote(postId, type) {
        const res = await fetch(`${API_BASE}?action=vote`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ postId, type, userId: currentUser?.id })
        });
        return await res.json();
    }

    async function renderFeed() {
        const container = document.getElementById('mainContent');
        container.innerHTML = '<div class="loading">Загрузка идей...</div>';
        await fetchPosts();
        await Promise.all(allPosts.map(p => fetchComments(p.id)));
        container.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:15px;">
                <h2>🎯 Идеи для стрима</h2>
                <div style="display:flex; gap:10px;">
                    <select id="categoryFilter" class="input-modern" style="width:auto;">
                        <option value="all">Все категории</option>
                        <option value="Видео">🎬 Видео</option>
                        <option value="Фильм">🎥 Фильм</option>
                        <option value="Аниме">🍥 Аниме</option>
                        <option value="Сериал">📺 Сериал</option>
                        <option value="Игра">🎮 Игра</option>
                        <option value="Другое">✨ Другое</option>
                    </select>
                    <select id="sortSelect" class="input-modern" style="width:auto;">
                        <option value="date_desc">📅 Сначала новые</option>
                        <option value="date_asc">📅 Сначала старые</option>
                        <option value="rating_desc">👍 По рейтингу</option>
                    </select>
                    ${currentUser ? `<button class="btn-primary" id="newPostBtn">➕ Новая идея</button>` : ''}
                </div>
            </div>
            <div id="feedPosts"></div>
        `;
        if (currentUser) document.getElementById('newPostBtn').addEventListener('click', openPostModal);
        const sortSelect = document.getElementById('sortSelect');
        sortSelect.value = settings.defaultSort;
        sortSelect.addEventListener('change', (e) => {
            settings.defaultSort = e.target.value;
            saveSettings();
            renderFeed();
        });
        const categoryFilter = document.getElementById('categoryFilter');
        categoryFilter.addEventListener('change', () => renderFeed());
        const feedDiv = document.getElementById('feedPosts');
        let filtered = [...allPosts];
        const selectedCategory = categoryFilter.value;
        if (selectedCategory !== 'all') {
            filtered = filtered.filter(p => p.category === selectedCategory);
        }
        let sorted = [...filtered];
        if (settings.defaultSort === 'date_desc') sorted.sort((a,b) => new Date(b.date) - new Date(a.date));
        else if (settings.defaultSort === 'date_asc') sorted.sort((a,b) => new Date(a.date) - new Date(b.date));
        else sorted.sort((a,b) => (b.rating || 0) - (a.rating || 0));
        feedDiv.innerHTML = sorted.map(post => renderPostCard(post)).join('');
        attachPostEventListeners();
    }

    function renderPostCard(post) {
        const comments = allComments[post.id] || [];
        const userVote = userVotes[post.id] || 0;
        return `
            <div class="card" data-post-id="${post.id}">
                <div class="post-header">
                    <img class="post-avatar" src="${post.avatar || 'https://static-cdn.jtvnw.net/user-default-pictures-uv/13e5d884-3c7e-4c9a-9c6c-6f3c6d5f8e6a-profile_image-70x70.png'}">
                    <div>
                        <div class="post-author">${escapeHtml(post.nick)}</div>
                        <div class="post-time">${post.date}</div>
                    </div>
                </div>
                <div class="post-content"><strong>${escapeHtml(post.title || '')}</strong><br>${escapeHtml(post.text || '')}</div>
                <div>
                    <span class="post-tag">${getCategoryEmoji(post.category)} ${post.category}</span>
                    ${post.game ? `<span class="post-tag">🎮 ${escapeHtml(post.game)}</span>` : ''}
                    ${post.link ? `<span class="post-tag"><a href="${post.link}" target="_blank" style="color:#bf7cff;">🔗 ссылка</a></span>` : ''}
                </div>
                <div class="post-stats">
                    <button class="stat-btn ${userVote === 1 ? 'active' : ''}" data-action="up" data-post="${post.id}">👍 ${post.rating || 0}</button>
                    <button class="stat-btn ${userVote === -1 ? 'active' : ''}" data-action="down" data-post="${post.id}">👎 ${post.ratingDown || 0}</button>
                    <button class="stat-btn" data-action="toggleComments" data-post="${post.id}">💬 ${comments.length}</button>
                </div>
                <div class="comment-section" id="comments-${post.id}" style="display:none;">
                    <div id="comments-list-${post.id}">${comments.map(c => renderComment(c)).join('')}</div>
                    ${currentUser ? `
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <input type="text" id="comment-input-${post.id}" class="input-modern" placeholder="Написать комментарий..." style="flex:1;">
                            <button class="btn-primary" onclick="submitComment('${post.id}')">➡️</button>
                        </div>
                    ` : '<p style="color:#bda0e6;">Войдите, чтобы комментировать</p>'}
                </div>
            </div>
        `;
    }

    function renderComment(comment) {
        return `
            <div class="comment">
                <img class="comment-avatar" src="${comment.avatar || 'https://static-cdn.jtvnw.net/user-default-pictures-uv/13e5d884-3c7e-4c9a-9c6c-6f3c6d5f8e6a-profile_image-70x70.png'}">
                <div class="comment-bubble">
                    <div class="comment-meta"><strong>${escapeHtml(comment.nick)}</strong> · ${comment.date}</div>
                    <div>${escapeHtml(comment.text)}</div>
                </div>
            </div>
        `;
    }

    function getCategoryEmoji(cat) {
        const map = { 'Видео':'🎬', 'Фильм':'🎥', 'Аниме':'🍥', 'Сериал':'📺', 'Игра':'🎮', 'Другое':'✨' };
        return map[cat] || '📌';
    }

    function attachPostEventListeners() {
        document.querySelectorAll('.stat-btn[data-action="up"]').forEach(btn => {
            btn.onclick = async () => {
                if (!currentUser) { alert('Войдите через Twitch'); return; }
                const postId = btn.dataset.post;
                const res = await vote(postId, 'up');
                if (res.success) {
                    userVotes[postId] = 1;
                    localStorage.setItem('userVotes', JSON.stringify(userVotes));
                    await renderFeed();
                }
            };
        });
        document.querySelectorAll('.stat-btn[data-action="down"]').forEach(btn => {
            btn.onclick = async () => {
                if (!currentUser) { alert('Войдите через Twitch'); return; }
                const postId = btn.dataset.post;
                const res = await vote(postId, 'down');
                if (res.success) {
                    userVotes[postId] = -1;
                    localStorage.setItem('userVotes', JSON.stringify(userVotes));
                    await renderFeed();
                }
            };
        });
        document.querySelectorAll('.stat-btn[data-action="toggleComments"]').forEach(btn => {
            btn.onclick = () => {
                const postId = btn.dataset.post;
                const section = document.getElementById(`comments-${postId}`);
                section.style.display = section.style.display === 'none' ? 'block' : 'none';
            };
        });
    }

    window.submitComment = async function(postId) {
        const input = document.getElementById(`comment-input-${postId}`);
        if (!input.value.trim()) return;
        await addComment(postId, input.value);
        input.value = '';
        await renderFeed();
    };

    function openPostModal() {
        if (!currentUser) { alert('Войдите через Twitch'); return; }
        document.getElementById('postModal').style.display = 'flex';

    function closePostModal() {
        document.getElementById('postModal').style.display = 'none';
        document.getElementById('postTitle').value = '';

        document.getElementById('postGame').value = '';
        document.getElementById('postLink').value = '';
    }
    document.getElementById('submitPostBtn').onclick = async () => {
        const title = document.getElementById('postTitle').value;
        const text = document.getElementById('postText').value;
        if (!text.trim()) { alert('Напишите текст'); return; }
        const postData = {
            title, text,
            category: document.getElementById('postCategory').value,
            game: document.getElementById('postGame').value,
            link: document.getElementById('postLink').value,
            nick: currentUser.display_name,
            avatar: currentUser.profile_image_url,
            userId: currentUser.id
        };
        await createPost(postData);
        closePostModal();
        await renderFeed();
    };
    document.getElementById('closeModalBtn').onclick = closePostModal;

    async function renderCalendar() {
        const container = document.getElementById('mainContent');
        container.innerHTML = '<div class="loading">Загрузка календаря...</div>';
        try {
            const res = await fetch(`${API_BASE}?action=vods`);
            if (!res.ok) throw new Error('HTTP error');
            const vods = await res.json();
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = '<div class="card"><h2>📅 Календарь стримов</h2><div class="calendar-grid">';
            for (let i = 0; i < firstDay; i++) html += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${d}.${month+1}.${year}`;
                const hasVod = vods.some(v => v.date === dateStr);
                const vodUrl = hasVod ? vods.find(v => v.date === dateStr).url : 'https://twitch.tv/honesty113';
                html += `<div class="calendar-day ${hasVod ? 'has-vod' : ''}" onclick="window.open('${vodUrl}', '_blank')">${d}</div>`;
            }
            html += '</div></div>';
            container.innerHTML = html;
        } catch (err) {
            console.error('Calendar error:', err);
            container.innerHTML = '<div class="card"><h2>📅 Календарь стримов</h2><p>Ошибка загрузки календаря. Проверьте лист vods в таблице.</p></div>';
        }
    }

    async function renderProfile() {
        if (!currentUser) {
            document.getElementById('mainContent').innerHTML = '<div class="card"><h2>👤 Профиль</h2><p>Войдите через Twitch, чтобы увидеть свой профиль</p><button class="btn-primary" onclick="loginWithTwitch()">🔐 Войти через Twitch</button></div>';
            return;
        }
        await fetchPosts();
        const myPosts = allPosts.filter(p => p.authorId === currentUser.id);
        const totalRating = myPosts.reduce((sum,p) => sum + (p.rating || 0), 0);
        const commentsCount = myPosts.reduce((sum,p) => sum + (allComments[p.id] ? allComments[p.id].length : 0), 0);
        document.getElementById('mainContent').innerHTML = `
            <div class="card">
                <div class="profile-header">
                    <img src="${currentUser.profile_image_url}" class="profile-avatar">

                        <h2>${escapeHtml(currentUser.display_name)}</h2>
                        <p>Twitch ID: ${currentUser.id}</p>
                    </div>
                </div>
                <div class="profile-stats">
                    <div class="profile-stat">

                    </div>

                    <div class="profile-stat">
                        <div class="profile-stat-value">${commentsCount}</div>
                        <div class="profile-stat-label">Комментариев</div>
                    </div>
                </div>
                <h3>🔥 Мои идеи</h3>
                ${myPosts.length ? myPosts.map(p => `<div class="post-content" style="margin-top:10px; padding:10px; background:rgba(0,0,0,0.2); border-radius:20px;">📌 ${escapeHtml(p.title || p.text.substring(0,50))} 👍 ${p.rating || 0}</div>`).join('') : '<p>Нет идей</p>'}
                <button class="btn-primary" style="margin-top:20px;" onclick="logout()">🚪 Выйти из аккаунта</button>
            </div>
        `;
    }

    function loadPage(page) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelector(`[data-page="${page}"]`).classList.add('active');
        if (page === 'feed') renderFeed();
        else if (page === 'calendar') renderCalendar();
        else if (page === 'links') renderLinks();
        else if (page === 'settings') renderSettings();
        else if (page === 'profile') renderProfile();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => loadPage(item.dataset.page));
    });

    applySettings();
    loadUserFromStorage();
    checkTwitchAuth();
    loadPage('feed');

    window.openPostModal = openPostModal;
    window.loginWithTwitch = loginWithTwitch;
    window.logout = logout;
    window.submitComment = submitComment;
</script>
