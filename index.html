<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honesty113 | Творчество стримера</title>
    <style>
        /* ===== ВСЕ ТВОИ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0d0015 0%, #1e0a2b 70%, #2d1040 100%);
            color: #f0e6ff;
            min-height: 100vh;
            padding: 30px 20px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1400px;
            width: 100%;
        }

        /* ===== ШАПКА ===== */
        .header-card {
            background: rgba(75, 20, 120, 0.3);
            backdrop-filter: blur(8px);
            border: 2px solid #a55be0;
            border-radius: 60px;
            padding: 25px 35px;
            margin-bottom: 40px;
        }

        .header-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .header-left, .header-right {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            min-width: 160px;
        }

        .title-box {
            text-align: center;
            flex: 2;
            min-width: 300px;
        }

        .title-box .nick {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ceadff, #a159ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .kalevan-box span {
            background: #ab73ff;
            color: #140021;
            padding: 8px 25px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .social-btn {
            background: #2e1d40;
            border: 2px solid #9a5fde;
            border-radius: 50px;
            padding: 16px 20px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 6px 0 #311f49;
            transition: 0.15s;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .donate-btn { background: #c43aff; }
        .huyustriki-btn { background: #b84a8c; }
        .twitch-login-btn { background: #9147ff; }

        /* ===== ПЛЕЕР ===== */
        .stream-full {
            width: 100%;
            margin-bottom: 40px;
        }

        .twitch-embed {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            border-radius: 30px;
            border: 4px solid #c28eff;
            overflow: hidden;
        }

        .twitch-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ===== КАЛЕНДАРЬ + ФАКТ ===== */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }

        .info-card {
            background: rgba(42, 16, 63, 0.8);
            border: 2px solid #ac71e6;
            border-radius: 40px;
            padding: 25px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }

        .calendar-day {
            background: #1e102b;
            padding: 12px 0;
            border-radius: 20px;
            border: 1px solid #6a3e9e;
        }

        .calendar-day.stream-day {
            background: #7d3eb0;
            box-shadow: 0 0 12px #b05eff;
        }

        .fact-text {
            font-size: 1.3rem;
            background: #221530;
            padding: 20px;
            border-radius: 25px;
            border-left: 6px solid #b47bf0;
        }

        /* ===== ИГРЫ ===== */
        .games-block {
            margin: 50px 0;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .game-square {
            background: #211030;
            border: 3px solid #a25ef0;
            border-radius: 35px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 12px 0 #3c2357;
        }

        .game-square.active {
            border-color: #00ff88;
            box-shadow: 0 12px 0 #008f4c, 0 0 20px #00ff88;
            background: #1a3a2a;
        }

        /* ===== ПРЕДЛОЖКИ ===== */
        .suggestions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .filter-select {
            background: #2e1d40;
            border: 2px solid #9a5fde;
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
        }

        .suggestions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .suggestion-square {
            background: #211030;
            border: 3px solid #a25ef0;
            border-radius: 35px;
            padding: 20px;
            box-shadow: 0 12px 0 #3c2357;
        }

        .suggestion-category {
            background: #7d3eb0;
            padding: 5px 15px;
            border-radius: 30px;
            display: inline-block;
        }

        .vote-btn {
            background: #4a2b6e;
            border: 1px solid #b47bf0;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        /* ===== МОДАЛКА ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #221530;
            border: 3px solid #a55be0;
            border-radius: 40px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #2c193b;
            border: 2px solid #b47bf0;
            border-radius: 30px;
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #2e1d40;
            padding: 8px 15px;
            border-radius: 40px;
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        .signature {
            margin-top: 60px;
            font-size: 1.8rem;
            text-align: center;
            background: #1d0b2c;
            padding: 18px 35px;
            border-radius: 70px;
            border: 3px solid #ac71e6;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ШАПКА -->
        <div class="header-card">
            <div class="header-content">
                <div class="header-left">
                    <a href="https://t.me/hoststreet" class="social-btn">📱 Telegram</a>
                    <a href="https://discord.gg/ynDWeAYB2" class="social-btn">💬 Discord</a>
                </div>

                <div class="title-box">
                    <div class="nick">Honesty113</div>
                    <h1>⚡TWITCH⚡</h1>
                    <div class="kalevan-box">
                        <span>🐻 Коллыван ⚔️</span>
                    </div>
                </div>

                <div class="header-right">
                    <a href="https://www.donationalerts.com/r/honesty113" class="social-btn donate-btn">💰 Donate</a>
                    <a href="https://memealerts.com/6602a0ee288f43c13c2293df" class="social-btn huyustriki-btn">🔞 Хуюстрики</a>
                </div>
            </div>
        </div>

        <!-- ПЛЕЕР -->
        <div class="stream-full">
            <div class="twitch-embed">
                <iframe src="https://player.twitch.tv/?channel=honesty113&parent=localhost&parent=honesty113.vercel.app" allowfullscreen></iframe>
            </div>
        </div>

        <!-- КАЛЕНДАРЬ + ФАКТ -->
        <div class="info-grid">
            <div class="info-card">
                <h2>📅 Календарь</h2>
                <div class="calendar-grid" id="calendar"></div>
            </div>
            <div class="info-card">
                <h2>🎲 Факт</h2>
                <div class="fact-text" id="randomFact"></div>
            </div>
        </div>

        <!-- ИГРЫ -->
        <div class="games-block">
            <h2>🎮 Игровой компас</h2>
            <div class="games-grid" id="gamesGrid">
                <!-- Заполняется из API -->
            </div>
        </div>

        <!-- ПРЕДЛОЖКИ -->
        <div class="suggestions-block">
            <div class="suggestions-header">
                <h2>🎯 Предложки</h2>
                <div>
                    <button class="social-btn twitch-login-btn" id="loginBtn">🔐 Войти</button>
                    <button class="social-btn donate-btn" id="suggestBtn" disabled>➕ Предложить</button>
                    <div id="userInfo" style="display: none;"></div>
                </div>
            </div>

            <div>
                <select id="categoryFilter" class="filter-select">
                    <option value="all">Все категории</option>
                </select>
                <select id="sortFilter" class="filter-select">
                    <option value="date_desc">📅 Новые</option>
                    <option value="votes_desc">👍 По голосам</option>
                </select>
            </div>

            <div class="suggestions-grid" id="suggestionsGrid">
                <div class="loading">⏳ Загрузка...</div>
            </div>
        </div>

        <!-- ПОДПИСЬ -->
        <div class="signature">✦ by BuShiZm ✦</div>
    </div>

    <!-- МОДАЛКА -->
    <div class="modal" id="suggestionModal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h3>🎮 Предложить</h3>
            <input type="text" id="suggestionTitle" placeholder="Название">
            <select id="suggestionCategory"></select>
            <input type="url" id="suggestionLink" placeholder="Ссылка">
            <textarea id="suggestionComment" placeholder="Комментарий"></textarea>
            <button id="submitSuggestion">🚀 Отправить</button>
        </div>
    </div>

    <script>
        const API_BASE = '/api'; // Vercel сам направит

        // Twitch OAuth
        const CLIENT_ID = 'oivt3xslzr0wi1b3eu4a59lntv5isk';
        const REDIRECT_URI = window.location.origin;

        let currentUser = null;

        // Загрузка данных
        async function loadSuggestions() {
            const res = await fetch(`${API_BASE}/get`);
            const data = await res.json();
            renderSuggestions(data);
        }

        async function loadGames() {
            const res = await fetch(`${API_BASE}/games`);
            const data = await res.json();
            renderGames(data);
        }

        async function loadCategories() {
            const res = await fetch(`${API_BASE}/categories`);
            const data = await res.json();
            const select = document.getElementById('suggestionCategory');
            select.innerHTML = data.map(c => `<option>${c}</option>`).join('');
        }

        // Остальная логика как в твоём коде, но с вызовами API
    </script>
</body>
</html>
