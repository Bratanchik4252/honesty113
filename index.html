<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honesty113 | Творчество стримера</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0d0015 0%, #1e0a2b 70%, #2d1040 100%);
            color: #f0e6ff;
            min-height: 100vh;
            padding: 30px 20px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeIn 1s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes glow {
            0% { box-shadow: 0 0 5px #b47bf0; }
            50% { box-shadow: 0 0 20px #b47bf0, 0 0 30px #a25ef0; }
            100% { box-shadow: 0 0 5px #b47bf0; }
        }

        .container {
            max-width: 1400px;
            width: 100%;
            animation: slideUp 0.8s ease-out;
        }

        /* ===== ШАПКА ===== */
        .header-card {
            background: rgba(75, 20, 120, 0.3);
            backdrop-filter: blur(8px);
            border: 2px solid #a55be0;
            border-radius: 60px;
            padding: 25px 35px;
            margin-bottom: 40px;
            box-shadow: 0 25px 35px -10px #2a0e3f;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.6s ease-out;
        }

        .header-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 40px -10px #4a2b6e;
        }

        .header-content {
            display: flex;
            flex-wrap: wrap;
            align-items: stretch;
            justify-content: space-between;
            gap: 20px;
        }

        .header-left, .header-right {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            min-width: 160px;
            justify-content: center;
        }

        .title-box {
            text-align: center;
            flex: 2;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .title-box .nick {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ceadff, #a159ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1.2;
            animation: pulse 3s infinite;
        }

        .kalevan-box span {
            background: #ab73ff;
            color: #140021;
            padding: 8px 25px;
            border-radius: 60px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 2px solid #f0e6ff;
            box-shadow: 0 4px 0 #4a2b6e;
            transition: all 0.3s ease;
        }

        .kalevan-box span:hover {
            background: #bf7cff;
            transform: scale(1.05);
            box-shadow: 0 6px 0 #4a2b6e;
        }

        .social-btn {
            background: #2e1d40;
            border: 2px solid #9a5fde;
            border-radius: 50px;
            padding: 16px 20px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 6px 0 #311f49;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            text-align: center;
            cursor: pointer;
            border: none;
        }

        .social-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 0 #311f49;
            filter: brightness(1.2);
        }

        .social-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #311f49;
        }

        .donate-btn { background: #c43aff; }
        .huyustriki-btn { background: #b84a8c; }
        .twitch-login-btn { background: #9147ff; }

        /* ===== ПЛЕЕР ===== */
        .stream-full {
            width: 100%;
            margin-bottom: 40px;
            animation: slideUp 0.7s ease-out;
        }

        .twitch-embed {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 30px;
            border: 4px solid #c28eff;
            box-shadow: 0 20px 30px -8px #000000b3;
            transition: all 0.4s ease;
        }

        .twitch-embed:hover {
            transform: scale(1.01);
            border-color: #b47bf0;
            box-shadow: 0 25px 35px -5px #a55be0;
        }

        /* ===== КАЛЕНДАРЬ + ФАКТ ===== */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }

        .info-card {
            background: rgba(42, 16, 63, 0.8);
            backdrop-filter: blur(5px);
            border: 2px solid #ac71e6;
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 15px 25px -5px #000000b3;
            transition: all 0.4s ease;
            animation: slideUp 0.8s ease-out;
        }

        .info-card:hover {
            transform: translateY(-8px);
            border-color: #bf7cff;
            box-shadow: 0 20px 30px -5px #7d3eb0;
        }

        .calendar-day {
            background: #1e102b;
            padding: 12px 0;
            border-radius: 20px;
            border: 1px solid #6a3e9e;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: default;
        }

        .calendar-day:hover {
            background: #3d2357;
            transform: scale(1.05);
            border-color: #b47bf0;
        }

        .calendar-day.stream-day {
            background: #7d3eb0;
            border-color: #bf7cff;
            font-weight: 700;
            box-shadow: 0 0 12px #b05eff;
            animation: glow 2s infinite;
        }

        .fact-text {
            font-size: 1.3rem;
            font-style: italic;
            background: #221530;
            padding: 20px;
            border-radius: 25px;
            border-left: 6px solid #b47bf0;
            line-height: 1.5;
            transition: all 0.3s ease;
        }

        .fact-text:hover {
            background: #2f1b42;
            border-left-width: 10px;
            transform: translateX(5px);
        }

        /* ===== ИГРЫ ===== */
        .games-block {
            margin: 50px 0;
            animation: slideUp 0.9s ease-out;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .game-square {
            background: #211030;
            border: 3px solid #a25ef0;
            border-radius: 35px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 12px 0 #3c2357;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .game-square:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 0 #3c2357;
            border-color: #bf7cff;
        }

        .game-square:active {
            transform: translateY(4px);
            box-shadow: 0 8px 0 #3c2357;
        }

        .game-square.active {
            border-color: #00ff88;
            box-shadow: 0 12px 0 #008f4c, 0 0 20px #00ff88;
            background: #1a3a2a;
            animation: pulse 2s infinite;
        }

        /* ===== ПРЕДЛОЖКИ ===== */
        .suggestions-block {
            margin: 50px 0;
            animation: slideUp 1s ease-out;
        }

        .suggestions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .suggestion-square {
            background: #211030;
            border: 3px solid #a25ef0;
            border-radius: 35px;
            padding: 20px;
            box-shadow: 0 12px 0 #3c2357;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            animation: slideUp 0.5s ease-out forwards;
        }

        .suggestion-square:nth-child(1) { animation-delay: 0.1s; }
        .suggestion-square:nth-child(2) { animation-delay: 0.2s; }
        .suggestion-square:nth-child(3) { animation-delay: 0.3s; }
        .suggestion-square:nth-child(4) { animation-delay: 0.4s; }
        .suggestion-square:nth-child(5) { animation-delay: 0.5s; }
        .suggestion-square:nth-child(6) { animation-delay: 0.6s; }

        .suggestion-square:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 0 #3c2357;
            border-color: #bf7cff;
        }

        .vote-btn {
            background: #4a2b6e;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #b47bf0;
        }

        .vote-btn:hover {
            background: #6a3e9e;
            transform: scale(1.05);
            box-shadow: 0 0 15px #b47bf0;
        }

        .vote-btn:active {
            transform: scale(0.95);
        }

        .filter-select {
            background: #2e1d40;
            border: 2px solid #9a5fde;
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-select:hover {
            background: #3d2357;
            border-color: #bf7cff;
            transform: scale(1.02);
        }

        /* ===== МОДАЛКА ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: #221530;
            border: 3px solid #a55be0;
            border-radius: 40px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            animation: slideUp 0.3s ease forwards;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #2e1d40;
            padding: 8px 15px;
            border-radius: 40px;
            border: 1px solid #b47bf0;
            transition: all 0.3s ease;
        }

        .user-info:hover {
            transform: scale(1.05);
            border-color: #bf7cff;
        }

        .signature {
            margin-top: 60px;
            font-size: 1.8rem;
            text-align: center;
            background: #1d0b2c;
            padding: 18px 35px;
            border-radius: 70px;
            border: 3px solid #ac71e6;
            display: inline-block;
            box-shadow: 0 0 25px #9f67e0;
            transition: all 0.4s ease;
            animation: pulse 3s infinite;
        }

        .signature:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #bf7cff;
        }

        .loading {
            text-align: center;
            color: #bda0e6;
            grid-column: 1/-1;
            padding: 40px;
            font-size: 1.2rem;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ШАПКА -->
        <div class="header-card">
            <div class="header-content">
                <div class="header-left">
                    <a href="https://t.me/hoststreet" target="_blank" class="social-btn">📱 Telegram</a>
                    <a href="https://discord.gg/ynDWeAYB2" target="_blank" class="social-btn">💬 Discord</a>
                </div>

                <div class="title-box">
                    <div class="nick">Honesty113</div>
                    <h1>⚡TWITCH⚡</h1>
                    <div class="kalevan-box">
                        <span>🐻 Коллыван ⚔️</span>
                    </div>
                </div>

                <div class="header-right">
                    <a href="https://www.donationalerts.com/r/honesty113" target="_blank" class="social-btn donate-btn">💰 Donate</a>
                    <a href="https://memealerts.com/6602a0ee288f43c13c2293df" target="_blank" class="social-btn huyustriki-btn">🔞 Хуюстрики</a>
                </div>
            </div>
        </div>

        <!-- ПЛЕЕР -->
        <div class="stream-full">
            <div class="twitch-embed">
                <iframe src="https://player.twitch.tv/?channel=honesty113&parent=localhost&parent=honesty113.vercel.app" allowfullscreen="true" scrolling="no" allow="autoplay; fullscreen"></iframe>
            </div>
        </div>

        <!-- КАЛЕНДАРЬ + ФАКТ -->
        <div class="info-grid">
            <div class="info-card">
                <h2>📅 Календарь стримов</h2>
                <div class="calendar-grid" id="calendar"></div>
                <p style="margin-top: 20px; text-align: center; color: #bda0e6;">🌟 Стримы каждый день в 18:00 МСК</p>
            </div>
            <div class="info-card">
                <h2>🎲 Знаете ли вы?</h2>
                <div class="fact-text" id="randomFact"></div>
            </div>
        </div>

        <!-- ИГРЫ -->
        <div class="games-block">
            <h2>🎮 Игровой компас</h2>
            <div class="games-grid" id="gamesGrid"></div>
        </div>

        <!-- ПРЕДЛОЖКИ -->
        <div class="suggestions-block">
            <div class="suggestions-header">
                <h2>🎯 Предложки</h2>
                <div class="login-bar">
                    <button class="social-btn twitch-login-btn" id="loginBtn">🔐 Войти через Twitch</button>
                    <button class="social-btn donate-btn" id="suggestBtn" disabled>➕ Предложить</button>
                    <div id="userInfo" style="display: none;"></div>
                </div>
            </div>
            
            <div class="filter-controls">
                <select id="categoryFilter" class="filter-select">
                    <option value="all">Все категории</option>
                </select>
                <select id="sortFilter" class="filter-select">
                    <option value="date_desc">📅 Сначала новые</option>
                    <option value="date_asc">📅 Сначала старые</option>
                    <option value="votes_desc">👍 По голосам (сначала больше)</option>
                    <option value="votes_asc">👍 По голосам (сначала меньше)</option>
                </select>
            </div>

            <div class="suggestions-grid" id="suggestionsGrid">
                <div class="loading">⏳ Загрузка предложек...</div>
            </div>
        </div>

        <!-- ПОДПИСЬ -->
        <div class="footer-note">
            <div class="signature">✦ by BuShiZm ✦</div>
            <small>для самого честного стримера Honesty113</small>
        </div>
    </div>

    <!-- МОДАЛКА -->
    <div class="modal" id="suggestionModal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h3>🎮 Предложить игру или видео</h3>
            <div id="modalMessage" class="message" style="display: none;"></div>
            <input type="text" id="suggestionTitle" placeholder="Название" required>
            <select id="suggestionCategory"></select>
            <input type="url" id="suggestionLink" placeholder="Ссылка (необязательно)">
            <textarea id="suggestionComment" placeholder="Комментарий" rows="3"></textarea>
            <button id="submitSuggestion">🚀 Отправить</button>
        </div>
    </div>

    <script>
        // === НАСТРОЙКИ ===
        const API_BASE = '/api';
        const CLIENT_ID = 'oivt3xslzr0wi1b3eu4a59lntv5isk';
        const REDIRECT_URI = window.location.origin;

        let currentUser = null;
        let allSuggestions = [];
        let filteredSuggestions = [];
        let currentCategory = 'all';
        let currentSort = 'date_desc';

        // === КАЛЕНДАРЬ ===
        function renderCalendar() {
            const calendarDiv = document.getElementById('calendar');
            const days = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
            const today = new Date();
            let html = '';
            for (let i = 0; i < 7; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() + i);
                const dayName = days[date.getDay()];
                const dayNumber = date.getDate();
                const isPast = date.setHours(0,0,0,0) < new Date().setHours(0,0,0,0);
                html += `<div class="calendar-day stream-day ${isPast ? 'off' : ''}"><span class="day-label">${dayName}</span> ${dayNumber}</div>`;
            }
            calendarDiv.innerHTML = html;
        }
        renderCalendar();

        // === СЛУЧАЙНЫЙ ФАКТ ===
        const facts = [
            "Honesty113 стримит каждый день без выходных!",
            "Коллыван — его главный зритель и вдохновитель.",
            "Любимая игра — Minecraft, но пробует всё подряд.",
            "В Valorant 'жду только я' — это уже мем.",
            "Однажды стримил 24 часа подряд.",
            "Его Telegram-канал живёт своей жизнью.",
            "Честность — главное качество стримера.",
            "Обожает, когда в чате пишут его эмоции."
        ];
        document.getElementById('randomFact').innerText = facts[Math.floor(Math.random() * facts.length)];

        // === ИГРЫ ===
        function renderGames() {
            const gamesGrid = document.getElementById('gamesGrid');
            gamesGrid.innerHTML = `
                <div class="game-square active"><div class="game-icon">⛏️</div><div class="game-title">MINECRAFT</div><div class="game-status">🟢 сейчас играет</div></div>
                <div class="game-square active"><div class="game-icon">😱</div><div class="game-title">OUTLAST 2</div><div class="game-status">🟢 сейчас играет</div></div>
                <div class="game-square"><div class="game-icon">🧛</div><div class="game-title">RESIDENT EVIL 8</div><div class="game-status">⚪ забросил</div></div>
                <div class="game-square"><div class="game-icon">🌃</div><div class="game-title">CYBERPUNK 2077</div><div class="game-status">🔴 не начинал</div></div>
                <div class="game-square"><div class="game-icon">🔫</div><div class="game-title">VALORANT</div><div class="game-status">💤 жду только я</div></div>
                <div class="game-square"><div class="game-icon">🎲</div><div class="game-title">...</div><div class="game-status">скоро узнаем</div></div>
            `;
        }
        renderGames();

        // === TWITCH АВТОРИЗАЦИЯ ===
        function checkTwitchAuth() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');
            
            if (accessToken) {
                fetch('https://api.twitch.tv/helix/users', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Client-ID': CLIENT_ID
                    }
                })
                .then(res => res.json())
                .then(data => {
                    if (data.data && data.data[0]) {
                        currentUser = data.data[0];
                        updateUIForUser();
                        window.location.hash = '';
                    }
                });
            }
        }

        function loginWithTwitch() {
            const scopes = 'user:read:email';
            const authUrl = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=${scopes}`;
            window.location.href = authUrl;
        }

        function updateUIForUser() {
            if (currentUser) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('suggestBtn').disabled = false;
                
                const userInfoDiv = document.getElementById('userInfo');
                userInfoDiv.style.display = 'flex';
                userInfoDiv.innerHTML = `
                    <div class="user-info">
                        <img src="${currentUser.profile_image_url}" class="user-avatar">
                        <span>${currentUser.display_name}</span>
                    </div>
                `;
            }
        }

        // === ЗАГРУЗКА ПРЕДЛОЖЕК ===
        async function loadSuggestions() {
            try {
                const response = await fetch(`${API_BASE}/get_suggestions`);
                const data = await response.json();
                allSuggestions = data;
                applyFilters();
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('suggestionsGrid').innerHTML = '<div class="loading">❌ Ошибка загрузки</div>';
            }
        }

        function applyFilters() {
            filteredSuggestions = [...allSuggestions];
            
            if (currentCategory !== 'all') {
                filteredSuggestions = filteredSuggestions.filter(s => s.category === currentCategory);
            }
            
            switch(currentSort) {
                case 'date_desc':
                    filteredSuggestions.sort((a, b) => new Date(b.date) - new Date(a.date));
                    break;
                case 'date_asc':
                    filteredSuggestions.sort((a, b) => new Date(a.date) - new Date(b.date));
                    break;
                case 'votes_desc':
                    filteredSuggestions.sort((a, b) => b.votes - a.votes);
                    break;
                case 'votes_asc':
                    filteredSuggestions.sort((a, b) => a.votes - b.votes);
                    break;
            }
            
            renderSuggestions();
        }

        function renderSuggestions() {
            const grid = document.getElementById('suggestionsGrid');
            
            if (filteredSuggestions.length === 0) {
                grid.innerHTML = '<div class="loading">📭 Нет предложек</div>';
                return;
            }

            grid.innerHTML = filteredSuggestions.map(s => `
                <div class="suggestion-square">
                    <span class="suggestion-category">${s.category}</span>
                    <div class="suggestion-title">${s.title}</div>
                    <div class="suggestion-author">👤 ${s.nick}</div>
                    ${s.link && s.link !== '-' ? `<div class="suggestion-link"><a href="${s.link}" target="_blank">🔗 ссылка</a></div>` : ''}
                    ${s.comment && s.comment !== '-' ? `<div class="suggestion-comment">💬 ${s.comment}</div>` : ''}
                    <div class="suggestion-votes">
                        <span class="vote-count">👍 ${s.votes}</span>
                    </div>
                </div>
            `).join('');
        }

        // === КАТЕГОРИИ ===
        async function loadCategories() {
            try {
                const response = await fetch(`${API_BASE}/get_categories`);
                const categories = await response.json();
                const select = document.getElementById('suggestionCategory');
                const filterSelect = document.getElementById('categoryFilter');
                
                select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
                
                let filterOptions = '<option value="all">Все категории</option>';
                categories.forEach(c => {
                    filterOptions += `<option value="${c}">${c}</option>`;
                });
                filterSelect.innerHTML = filterOptions;
            } catch (error) {
                console.error('Ошибка загрузки категорий:', error);
            }
        }

        // === МОДАЛКА ===
        const modal = document.getElementById('suggestionModal');
        const suggestBtn = document.getElementById('suggestBtn');
        const closeBtn = document.getElementById('closeModal');

        suggestBtn.onclick = () => {
            if (currentUser) {
                modal.style.display = 'flex';
            }
        };

        closeBtn.onclick = () => {
            modal.style.display = 'none';
        };

        window.onclick = (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        };

        // === ОТПРАВКА ===
        document.getElementById('submitSuggestion').onclick = async () => {
            if (!currentUser) return;

            const title = document.getElementById('suggestionTitle').value;
            if (!title) {
                document.getElementById('modalMessage').style.display = 'block';
                document.getElementById('modalMessage').innerText = '❌ Введите название';
                return;
            }

            const suggestion = {
                nick: currentUser.display_name,
                title: title,
                category: document.getElementById('suggestionCategory').value,
                link: document.getElementById('suggestionLink').value || '-',
                comment: document.getElementById('suggestionComment').value || '-',
                userId: currentUser.id
            };

            try {
                const response = await fetch(`${API_BASE}/add_suggestion`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(suggestion)
                });
                
                if (response.ok) {
                    modal.style.display = 'none';
                    document.getElementById('suggestionTitle').value = '';
                    document.getElementById('suggestionLink').value = '';
                    document.getElementById('suggestionComment').value = '';
                    loadSuggestions();
                }
            } catch (error) {
                console.error('Ошибка:', error);
            }
        };

        // === СЛУШАТЕЛИ ===
        document.getElementById('categoryFilter').addEventListener('change', (e) => {
            currentCategory = e.target.value;
            applyFilters();
        });

        document.getElementById('sortFilter').addEventListener('change', (e) => {
            currentSort = e.target.value;
            applyFilters();
        });

        // === ИНИЦИАЛИЗАЦИЯ ===
        checkTwitchAuth();
        loadSuggestions();
        loadCategories();
        document.getElementById('loginBtn').onclick = loginWithTwitch;
        setInterval(loadSuggestions, 300000);
    </script>
</body>
</html>
